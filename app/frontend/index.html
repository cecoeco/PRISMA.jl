<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1" 
    />
    <title>PRISMA.jl</title>
    <meta 
        name="description" 
        content="Generate checklists and flow diagrams for systematic reviews and meta-analyses." 
    />
    <meta

        content="Ceco E Maples"

    />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXX"></script>
    <script>
        /**
         * Represents the global dataLayer object.
         * @type {Array}
         */
        window.dataLayer = window.dataLayer || [];

        /**
         * A function to push arguments to the dataLayer.
         * @param {...*} arguments - Arguments to be pushed to the dataLayer.
         */
        function gtag() {
            dataLayer.push(arguments);
        }

        // Initializes the 'js' command in the dataLayer.
        gtag('js', new Date());

        /**
         * Configures Google Analytics tracking IDs in the dataLayer.
         * @param {string} trackingId - The tracking ID to be configured.
         */
        function configureTracking(trackingId) {
            gtag('config', trackingId);
        }

        // Configures the first Google Analytics tracking ID.
        configureTracking('GT-XXXXXX');

        // Configures the second Google Analytics tracking ID.
        configureTracking('DC-ZZZZZZ');
    </script>
</head>
